<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ShotShooter v4</title>
  <style>
    :root {
      --bg: #080a10;
      --card: #111522;
      --card-2: #171d2d;
      --text: #f7f8fb;
      --muted: #8892a6;
      --line: rgba(255,255,255,.09);
      --cyan: #22e6ff;
      --pink: #ff3d81;
      --yellow: #ffd166;
      --green: #55ff9a;
      --shadow: 0 20px 55px rgba(0,0,0,.42);
      --radius: 26px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(34,230,255,.18), transparent 32%),
        radial-gradient(circle at 90% 14%, rgba(255,61,129,.16), transparent 34%),
        linear-gradient(180deg, #090b12 0%, #05060a 100%);
      overflow-x: hidden;
    }

    .app {
      width: min(520px, 100%);
      margin: 0 auto;
      padding: max(16px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .title-wrap { min-width: 0; }

    .eyebrow {
      color: var(--cyan);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 900;
      margin-bottom: 5px;
    }

    h1 {
      margin: 0;
      font-family: "Trebuchet MS", "Avenir Next", "Segoe UI", system-ui, sans-serif;
      font-size: clamp(25px, 7.2vw, 38px);
      line-height: 1;
      letter-spacing: -1.1px;
      font-weight: 900;
      text-transform: none;
    }

    .top-actions {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .menu-btn {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
    }

    .menu-btn span {
      width: 20px;
      height: 20px;
      display: block;
      position: relative;
      color: rgba(255,255,255,.86);
    }

    .menu-btn span::before {
      content: "⚙";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 20px;
      line-height: 1;
    }

    .menu-btn::before,
    .menu-btn::after {
      content: none;
    }

    .status {
      flex: 0 0 auto;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: #c8d1df;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 99px;
      background: var(--green);
      box-shadow: 0 0 15px var(--green);
      animation: blink 1.4s infinite ease-in-out;
    }

    @keyframes blink { 50% { transform: scale(1.35); opacity: .45; } }

    .machine-card {
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.035));
      box-shadow: var(--shadow);
      padding: 16px;
      overflow: hidden;
    }

    .machine-card::before {
      content: "";
      position: absolute;
      inset: -40%;
      background: conic-gradient(from 180deg, transparent, rgba(34,230,255,.10), transparent, rgba(255,61,129,.08), transparent);
      animation: rotateBg 9s linear infinite;
      pointer-events: none;
    }

    @keyframes rotateBg { to { transform: rotate(360deg); } }

    .machine-inner { position: relative; z-index: 1; }

    .axis-area {
      height: 194px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), transparent),
        rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.08);
      position: relative;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .rail {
      position: absolute;
      left: 20px;
      right: 20px;
      top: 42px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,.18), rgba(255,255,255,.55), rgba(255,255,255,.18));
      box-shadow: 0 0 18px rgba(34,230,255,.2), inset 0 0 10px rgba(0,0,0,.6);
    }

    .head {
      position: absolute;
      top: 20px;
      left: 0px;
      width: 46px;
      height: 55px;
      border-radius: 15px;
      background: linear-gradient(145deg, #242c40, #0d111c);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 12px 28px rgba(0,0,0,.42);
      transition: left .55s cubic-bezier(.2,.9,.2,1), box-shadow .25s ease;
      z-index: 3;
      pointer-events: none;
    }

    .head.running { box-shadow: 0 12px 28px rgba(0,0,0,.42), 0 0 28px var(--active-color, var(--cyan)); }

    .head::before {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      top: 9px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      box-shadow: none;
    }

    .nozzle {
      position: absolute;
      left: 50%;
      top: 42px;
      width: 12px;
      height: 26px;
      transform: translateX(-50%);
      border-radius: 0 0 8px 8px;
      background: linear-gradient(180deg, #d7e2ee, #667184 54%, #111827);
      border: 1px solid rgba(255,255,255,.18);
    }

    .stream {
      position: absolute;
      left: 50%;
      top: 68px;
      width: 7px;
      height: 47px;
      transform: translateX(-50%) scaleY(0);
      transform-origin: top;
      border-radius: 999px;
      opacity: 0;
      background: linear-gradient(180deg, var(--active-color, var(--cyan)), transparent);
      box-shadow: 0 0 15px var(--active-color, var(--cyan));
    }

    .head.moving::before,
    .head.pouring::before {
      background: var(--active-color, var(--cyan));
      box-shadow: 0 0 12px var(--active-color, var(--cyan));
    }

    .head.pouring .stream { animation: pour .55s ease-in-out; }

    @keyframes pour {
      0% { opacity: 0; transform: translateX(-50%) scaleY(0); }
      20%, 82% { opacity: 1; transform: translateX(-50%) scaleY(1); }
      100% { opacity: 0; transform: translateX(-50%) scaleY(0); }
    }

    .track-glasses {
      position: absolute;
      left: 2px;
      right: 2px;
      bottom: 16px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1px;
      align-items: end;
    }

    .mini-glass {
      height: 78px;
      min-width: 0;
      position: relative;
      display: grid;
      justify-items: center;
      align-items: end;
      gap: 5px;
      border-radius: 16px;
      cursor: pointer;
      transition: transform .16s ease, background .16s ease, box-shadow .16s ease;
      padding-top: 3px;
    }

    .mini-glass:active { transform: scale(.96); }

    .mini-glass.selected {
      background: rgba(255,255,255,.055);
      box-shadow: 0 10px 22px rgba(0,0,0,.22);
    }

    .cup {
      width: clamp(47px, 13.1vw, 62px);
      height: 62px;
      position: relative;
      clip-path: polygon(11% 0,89% 0,77% 100%,23% 100%);
      border-radius: 8px 8px 17px 17px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.05), rgba(255,255,255,.30), rgba(255,255,255,.06)),
        rgba(170,185,205,.10);
      overflow: hidden;
      box-shadow: inset 0 0 12px rgba(255,255,255,.16), 0 9px 14px rgba(0,0,0,.35);
    }

    .cup::before {
      content: "";
      position: absolute;
      left: 7px;
      right: 7px;
      bottom: 6px;
      height: 64%;
      border-radius: 8px 8px 13px 13px;
      clip-path: polygon(10% 0,90% 0,76% 100%,24% 100%);
      background:
        linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,.045)),
        var(--glass-color, var(--cyan));
      opacity: .16;
      z-index: 1;
      pointer-events: none;
    }

    .fill {
      position: absolute;
      left: 7px;
      right: 7px;
      bottom: 6px;
      height: 0%;
      border-radius: 8px 8px 12px 12px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.34), rgba(255,255,255,.04) 30%),
        var(--glass-color, var(--cyan));
      box-shadow: 0 0 15px var(--glass-color, var(--cyan));
      clip-path: polygon(10% 0,90% 0,76% 100%,24% 100%);
      transition: height 1.35s ease, background .2s ease, opacity 1.35s ease;
      opacity: .88;
      z-index: 2;
    }

    .mini-glass.disabled {
      opacity: .34;
      filter: grayscale(.6);
    }

    .mini-glass.disabled .cup {
      background: linear-gradient(90deg, rgba(255,255,255,.04), rgba(255,255,255,.18), rgba(255,255,255,.04));
    }

    .mini-glass.disabled .cup::before {
      display: none;
    }

    .mini-glass.disabled .cup::after {
      content: "";
      position: absolute;
      left: 19%;
      right: 19%;
      top: 48%;
      height: 3px;
      border-radius: 99px;
      background: rgba(255,255,255,.7);
      transform: rotate(-18deg);
      z-index: 4;
    }

    .mini-glass.done .cup { animation: pop .32s ease; }
    @keyframes pop { 50% { transform: translateY(-5px) scale(1.05); } }

    .cup-label {
      font-size: 10px;
      font-weight: 900;
      color: var(--muted);
    }

    .progress {
      height: 11px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.08);
      margin: 14px 0 4px;
    }

    .bar {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--cyan), var(--pink));
      box-shadow: 0 0 18px rgba(34,230,255,.3);
      transition: width .22s ease;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 10px;
      margin: 18px 2px 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -.6px;
    }

    .section-title span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .config-box {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.085), rgba(255,255,255,.04));
      border-radius: 24px;
      padding: 14px;
      box-shadow: 0 16px 40px rgba(0,0,0,.26);
      transform-origin: top;
      animation: configIn .22s ease;
    }

    @keyframes configIn {
      from { opacity: 0; transform: translateY(-8px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .empty-config {
      border: 1px dashed rgba(255,255,255,.14);
      background: rgba(255,255,255,.035);
      border-radius: 24px;
      padding: 18px 14px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      line-height: 1.45;
    }

    .config-top {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 13px;
      align-items: center;
      margin-bottom: 13px;
    }

    .glass-preview {
      width: 70px;
      height: 82px;
      border-radius: 12px 12px 20px 20px;
      clip-path: polygon(9% 0,91% 0,78% 100%,22% 100%);
      background:
        linear-gradient(90deg, rgba(255,255,255,.04), rgba(255,255,255,.22), rgba(255,255,255,.04)),
        rgba(170,185,205,.10);
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 14px rgba(255,255,255,.10), 0 12px 22px rgba(0,0,0,.28);
      opacity: 1;
    }

    .glass-preview::before {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 7px;
      height: 62%;
      border-radius: 8px 8px 14px 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,.04)),
        var(--preview-color, var(--cyan));
      clip-path: polygon(9% 0,91% 0,77% 100%,23% 100%);
      opacity: .18;
    }

    .glass-preview::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 9px;
      height: 62%;
      border-radius: 8px 8px 14px 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.34), rgba(255,255,255,.04) 30%),
        var(--preview-color, var(--cyan));
      box-shadow: 0 0 16px var(--preview-color, var(--cyan));
      clip-path: polygon(8% 0,92% 0,76% 100%,24% 100%);
      opacity: .88;
      transition: height .35s ease;
    }

    .glass-preview.preview-off::before,
    .glass-preview.preview-off::after {
      opacity: 0;
    }

    .config-title {
      font-size: 18px;
      font-weight: 1000;
      letter-spacing: -.3px;
    }

    .config-subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-top: 3px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 12px;
      border-radius: 18px;
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(255,255,255,.08);
      margin-bottom: 11px;
    }

    .toggle-text {
      display: grid;
      gap: 2px;
    }

    .toggle-title {
      font-size: 13px;
      font-weight: 950;
    }

    .toggle-subtitle {
      font-size: 12px;
      color: var(--muted);
    }

    .switch {
      width: 54px;
      height: 32px;
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      padding: 4px;
      cursor: pointer;
      transition: background .18s ease, opacity .18s ease;
    }

    .switch span {
      display: block;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: rgba(255,255,255,.75);
      transition: transform .18s ease, background .18s ease;
    }

    .switch.active {
      background: var(--preview-color, var(--cyan));
    }

    .switch.active span {
      transform: translateX(22px);
      background: #fff;
    }

    .drink-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .drink-btn {
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.055);
      color: #dce6f5;
      border-radius: 16px;
      min-height: 54px;
      padding: 8px 6px;
      font-size: 12px;
      font-weight: 950;
      cursor: pointer;
      display: grid;
      place-items: center;
      gap: 5px;
      transition: transform .16s ease, border .16s ease, background .16s ease;
    }

    .drink-btn:active { transform: scale(.96); }

    .drink-btn .swatch {
      width: 26px;
      height: 7px;
      border-radius: 999px;
      background: var(--c);
      box-shadow: 0 0 10px var(--c);
    }

    .drink-btn.active {
      border-color: var(--c);
      background: rgba(255,255,255,.12);
      box-shadow: 0 0 15px rgba(255,255,255,.10);
    }

    .bottom-bar {
      position: sticky;
      bottom: 0;
      padding: 14px 0 2px;
      margin-top: 14px;
      background: linear-gradient(180deg, transparent, rgba(5,6,10,.94) 24%, rgba(5,6,10,.98));
      z-index: 10;
    }

    .shoot {
      width: 100%;
      min-height: 64px;
      border: 0;
      border-radius: 24px;
      color: #061018;
      background: linear-gradient(135deg, var(--cyan), #fff 46%, var(--pink));
      font-size: 22px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 18px 45px rgba(34,230,255,.22), 0 0 30px rgba(255,61,129,.14);
      position: relative;
      overflow: hidden;
    }

    .shoot::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.68), transparent);
      transform: translateX(-120%);
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0%, 35% { transform: translateX(-120%); }
      70%, 100% { transform: translateX(120%); }
    }

    .shoot:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 14px;
      background: rgba(0,0,0,.58);
      backdrop-filter: blur(10px);
    }

    .modal.open { display: flex; }

    .modal-panel {
      width: min(520px, 100%);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(25,31,48,.98), rgba(10,13,22,.98));
      box-shadow: 0 28px 80px rgba(0,0,0,.55);
      padding: 16px;
      animation: modalIn .22s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(18px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 1000;
      letter-spacing: -.5px;
    }

    .modal-head-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ble-btn {
      height: 40px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 999px;
      background: rgba(255,255,255,.07);
      color: white;
      font-size: 12px;
      font-weight: 950;
      padding: 0 13px;
      cursor: pointer;
    }

    .ble-btn.connected {
      border: 0;
      color: #061018;
      background: var(--green);
      box-shadow: 0 0 18px rgba(85,255,154,.32);
    }

    .close-btn {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 999px;
      background: rgba(255,255,255,.07);
      color: white;
      font-size: 22px;
      cursor: pointer;
    }

    .drink-editor {
      display: grid;
      gap: 10px;
    }

    .drink-edit-row {
      display: grid;
      grid-template-columns: 42px 1fr 50px 74px;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-radius: 20px;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.08);
    }

    .drink-number {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: var(--edit-color);
      color: #071018;
      font-weight: 1000;
      box-shadow: 0 0 18px var(--edit-color);
    }

    .drink-name-input {
      width: 100%;
      height: 42px;
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 14px;
      background: rgba(0,0,0,.24);
      color: white;
      font: inherit;
      font-weight: 800;
      padding: 0 12px;
      outline: none;
    }

    .drink-name-input:focus {
      border-color: rgba(255,255,255,.22);
      background: rgba(0,0,0,.34);
    }

    .color-input {
      width: 50px;
      height: 42px;
      border: 0;
      border-radius: 14px;
      background: transparent;
      cursor: pointer;
      padding: 0;
    }

    .prime-btn {
      height: 42px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      background: rgba(255,255,255,.08);
      color: white;
      font-size: 12px;
      font-weight: 1000;
      cursor: pointer;
      user-select: none;
      touch-action: none;
      transition: transform .12s ease, background .12s ease, box-shadow .12s ease;
    }

    .prime-btn:active,
    .prime-btn.priming {
      transform: scale(.96);
      background: var(--edit-color);
      color: #061018;
      box-shadow: 0 0 18px var(--edit-color);
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .modal-action {
      min-height: 48px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 18px;
      background: rgba(255,255,255,.07);
      color: white;
      font-weight: 950;
      cursor: pointer;
    }

    .modal-action.primary {
      border: 0;
      color: #061018;
      background: linear-gradient(135deg, var(--cyan), #fff 52%, var(--pink));
    }

    .log {
      margin-top: 10px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      text-align: center;
      min-height: 16px;
    }

    @media (min-width: 760px) {
      .app { width: min(980px, calc(100% - 36px)); padding-top: 28px; }
      .desktop-grid { display: grid; grid-template-columns: .95fr 1.05fr; gap: 16px; align-items: start; }
      .machine-card { position: sticky; top: 18px; }
      .bottom-bar { grid-column: 1 / -1; }
      .axis-area { height: 250px; }
      .track-glasses { bottom: 26px; gap: 10px; left: 10px; right: 10px; }
      .cup { width: 70px; height: 80px; }
      .mini-glass { height: 98px; }
      .head { width: 54px; height: 52px; }
      .nozzle { top: 46px; height: 32px; }
      .stream { top: 78px; height: 85px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="title-wrap">
        <h1>ShotShooter v4</h1>
      </div>
      <div class="top-actions">
        <button class="menu-btn" id="menuBtn" aria-label="Optionen"><span></span></button>
        <div class="status"><span class="dot"></span><span id="statusText">Ready</span></div>
      </div>
    </header>

    <div class="desktop-grid">
      <section class="machine-card">
        <div class="machine-inner">
          <div class="axis-area" id="axisArea">
            <div class="rail"></div>
            <div class="head" id="head">
              <div class="nozzle"></div>
              <div class="stream"></div>
            </div>

            <div class="track-glasses" id="trackGlasses">
              <div class="mini-glass selected" data-index="0"><div class="cup"><div class="fill"></div></div><div class="cup-label">01</div></div>
              <div class="mini-glass" data-index="1"><div class="cup"><div class="fill"></div></div><div class="cup-label">02</div></div>
              <div class="mini-glass" data-index="2"><div class="cup"><div class="fill"></div></div><div class="cup-label">03</div></div>
              <div class="mini-glass" data-index="3"><div class="cup"><div class="fill"></div></div><div class="cup-label">04</div></div>
              <div class="mini-glass" data-index="4"><div class="cup"><div class="fill"></div></div><div class="cup-label">05</div></div>
              <div class="mini-glass" data-index="5"><div class="cup"><div class="fill"></div></div><div class="cup-label">06</div></div>
            </div>
          </div>

          <div class="progress"><div class="bar" id="progressBar"></div></div>
        </div>
      </section>

      <section>
        <div class="section-title">
          <h2>Shots</h2>
        </div>

        <div id="configArea"></div>
      </section>

      <section class="bottom-bar">
        <button class="shoot" id="shootBtn">Shoot</button>
        <div class="log" id="logText"></div>
      </section>
    </div>
  </main>

  <div class="modal" id="settingsModal">
    <div class="modal-panel">
      <div class="modal-head">
        <div class="modal-title">Getränke</div>
        <div class="modal-head-actions">
          <button class="ble-btn" id="bleConnectBtn" type="button">BLE</button>
          <button class="close-btn" id="closeModal" aria-label="Schließen">×</button>
        </div>
      </div>

      <div class="drink-editor" id="drinkEditor"></div>

      <div class="modal-actions">
        <button class="modal-action" id="cancelSettings">Zurück</button>
        <button class="modal-action primary" id="saveSettings">Speichern</button>
      </div>
    </div>
  </div>

  <script>
    const drinks = [
      { id: 'vodka', name: 'Vodka', color: '#22e6ff' },
      { id: 'cherry', name: 'Cherry', color: '#ff3d81' },
      { id: 'tropic', name: 'Tropic', color: '#ffd166' }
    ];

    const state = Array.from({ length: 6 }, (_, i) => ({ glass: i + 1, drink: drinks[i % drinks.length], enabled: true }));

    const configArea = document.getElementById('configArea');
    const miniGlasses = Array.from(document.querySelectorAll('.mini-glass'));
    const fills = Array.from(document.querySelectorAll('.fill'));
    const head = document.getElementById('head');
    const shootBtn = document.getElementById('shootBtn');
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');
    const logText = document.getElementById('logText');
    const axisArea = document.getElementById('axisArea');
    const menuBtn = document.getElementById('menuBtn');
    const settingsModal = document.getElementById('settingsModal');
    const closeModal = document.getElementById('closeModal');
    const cancelSettings = document.getElementById('cancelSettings');
    const saveSettings = document.getElementById('saveSettings');
    const drinkEditor = document.getElementById('drinkEditor');
    const bleConnectBtn = document.getElementById('bleConnectBtn');

    let running = false;
    let selectedGlass = 0;
    let bleDevice = null;
    let bleCharacteristic = null;

    const BLE_SERVICE_UUID = '19b10000-e8f2-537e-4f6c-d104768a1214';
    const BLE_CHARACTERISTIC_UUID = '19b10001-e8f2-537e-4f6c-d104768a1214';

    async function connectBLE() {
      if (!navigator.bluetooth) {
        logText.textContent = 'BLE nicht verfügbar';
        return;
      }

      try {
        bleDevice = await navigator.bluetooth.requestDevice({
          filters: [{ namePrefix: 'ShotShooter' }],
          optionalServices: [BLE_SERVICE_UUID]
        });

        bleDevice.addEventListener('gattserverdisconnected', () => {
          bleCharacteristic = null;
          bleConnectBtn.classList.remove('connected');
          bleConnectBtn.textContent = 'BLE';
          logText.textContent = 'BLE getrennt';
        });

        const server = await bleDevice.gatt.connect();
        const service = await server.getPrimaryService(BLE_SERVICE_UUID);
        bleCharacteristic = await service.getCharacteristic(BLE_CHARACTERISTIC_UUID);

        bleConnectBtn.classList.add('connected');
        bleConnectBtn.textContent = 'BLE ✓';
        logText.textContent = 'BLE verbunden';
      } catch (error) {
        logText.textContent = 'BLE Fehler';
        console.error(error);
      }
    }

    async function bleSend(command) {
      if (!bleCharacteristic) {
        logText.textContent = 'Kein BLE';
        return false;
      }

      const data = new TextEncoder().encode(command + '\n');
      try {
        if (bleCharacteristic.writeValueWithoutResponse) {
          await bleCharacteristic.writeValueWithoutResponse(data);
        } else {
          await bleCharacteristic.writeValue(data);
        }
        return true;
      } catch (error) {
        logText.textContent = 'Sendefehler';
        console.error(error);
        return false;
      }
    }

    function getShotArray() {
      return state.map(item => item.enabled ? drinks.findIndex(drink => drink.id === item.drink.id) + 1 : 0);
    }

    async function sendShotSequence() {
      const sequence = getShotArray().join(',');
      await bleSend(`SEQ:${sequence}`);
    }

    async function startPrime(index, button) {
      if (running) return;
      const drink = drinks[index];
      document.documentElement.style.setProperty('--active-color', drink.color);
      button.classList.add('priming');
      head.classList.add('pouring');
      statusText.textContent = 'Prime';
      logText.textContent = drink.name;
      await bleSend(`PRIME:${index + 1}:1`);
    }

    async function stopPrime(button) {
      const activeButton = button || document.querySelector('.prime-btn.priming');
      const index = activeButton ? Number(activeButton.dataset.index) : null;
      activeButton?.classList.remove('priming');
      head.classList.remove('pouring');
      statusText.textContent = 'Ready';
      logText.textContent = '';
      if (index !== null && !Number.isNaN(index)) await bleSend(`PRIME:${index + 1}:0`);
    }

    function renderDrinkEditor() {
      drinkEditor.innerHTML = drinks.map((drink, index) => `
        <div class="drink-edit-row" style="--edit-color:${drink.color}">
          <div class="drink-number">${index + 1}</div>
          <input class="drink-name-input" value="${drink.name}" data-index="${index}" data-field="name" maxlength="14" />
          <input class="color-input" type="color" value="${drink.color}" data-index="${index}" data-field="color" />
          <button class="prime-btn" data-index="${index}" type="button">Prime</button>
        </div>
      `).join('');

      drinkEditor.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', () => {
          const row = input.closest('.drink-edit-row');
          const colorInput = row.querySelector('[data-field="color"]');
          row.style.setProperty('--edit-color', colorInput.value);
        });
      });

      drinkEditor.querySelectorAll('.prime-btn').forEach(button => {
        const index = Number(button.dataset.index);
        button.addEventListener('pointerdown', event => {
          event.preventDefault();
          button.setPointerCapture?.(event.pointerId);
          startPrime(index, button);
        });
        button.addEventListener('pointerup', () => stopPrime(button));
        button.addEventListener('pointercancel', () => stopPrime(button));
        button.addEventListener('pointerleave', () => stopPrime(button));
      });
    }

    function openSettings() {
      if (running) return;
      renderDrinkEditor();
      settingsModal.classList.add('open');
    }

    function closeSettings() {
      stopPrime(document.querySelector('.prime-btn.priming'));
      settingsModal.classList.remove('open');
    }

    function saveDrinkSettings() {
      drinkEditor.querySelectorAll('.drink-edit-row').forEach(row => {
        const nameInput = row.querySelector('[data-field="name"]');
        const colorInput = row.querySelector('[data-field="color"]');
        const index = Number(nameInput.dataset.index);
        drinks[index].name = nameInput.value.trim() || `Drink ${index + 1}`;
        drinks[index].color = colorInput.value;
      });

      state.forEach((item, index) => {
        const updatedDrink = drinks.find(drink => drink.id === item.drink.id) || drinks[0];
        item.drink = updatedDrink;
        updateGlassPreview(index);
      });

      renderConfig();
      closeSettings();
    }

    function renderConfig() {
      if (selectedGlass === null) {
        configArea.innerHTML = `<div class="empty-config"></div>`;
        return;
      }

      const item = state[selectedGlass];
      configArea.innerHTML = `
        <article class="config-box">
          <div class="config-top">
            <div class="glass-preview ${item.enabled ? '' : 'preview-off'}" style="--preview-color:${item.drink.color}"></div>
            <div>
              <div class="config-title">Shotglas ${String(selectedGlass + 1).padStart(2, '0')}</div>
              <div class="config-subtitle">${item.enabled ? item.drink.name : 'Aus'}</div>
            </div>
          </div>

          <div class="toggle-row" style="--preview-color:${item.drink.color}">
            <div class="toggle-text">
              <div class="toggle-title">Aktiv</div>
            </div>
            <button class="switch ${item.enabled ? 'active' : ''}" id="toggleShot" aria-label="Shot aktivieren oder deaktivieren"><span></span></button>
          </div>

          <div class="drink-buttons">
            ${drinks.map(drink => `
              <button class="drink-btn ${item.drink.id === drink.id ? 'active' : ''}" style="--c:${drink.color}" data-drink="${drink.id}">
                <span class="swatch"></span>
                ${drink.name}
              </button>
            `).join('')}
          </div>
        </article>
      `;

      const toggleShot = document.getElementById('toggleShot');
      toggleShot.addEventListener('click', () => {
        if (running || selectedGlass === null) return;
        state[selectedGlass].enabled = !state[selectedGlass].enabled;
        updateGlassPreview(selectedGlass);
        renderConfig();
        logText.textContent = state[selectedGlass].enabled ? 'Aktiv' : 'Aus';
      });

      document.querySelectorAll('.drink-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (running || selectedGlass === null) return;
          const drink = drinks.find(d => d.id === btn.dataset.drink);
          state[selectedGlass].drink = drink;
          updateGlassPreview(selectedGlass);
          renderConfig();
          moveHeadToGlass(selectedGlass);
          logText.textContent = drink.name;
        });
      });
    }

    function selectGlass(index) {
      if (running) return;
      selectedGlass = index;
      miniGlasses.forEach(g => g.classList.remove('selected'));
      miniGlasses[index].classList.add('selected');
      moveHeadToGlass(index);
      renderConfig();
      logText.textContent = '';
    }

    function updateGlassPreview(index) {
      const item = state[index];
      const drink = item.drink;
      miniGlasses[index].style.setProperty('--glass-color', drink.color);
      miniGlasses[index].classList.toggle('disabled', !item.enabled);
      fills[index].style.background = drink.color;
      fills[index].style.boxShadow = `0 0 15px ${drink.color}`;
      fills[index].style.height = item.enabled ? fills[index].style.height : '0%';
      if (!item.enabled) fills[index].style.opacity = '0';
    }

    function resetFill(animate = false) {
      miniGlasses.forEach(g => g.classList.remove('done'));
      fills.forEach(fill => {
        if (animate) {
          fill.style.opacity = '0';
          fill.style.height = '0%';
        } else {
          fill.style.opacity = '.88';
          fill.style.height = '0%';
        }
      });
      state.forEach((_, index) => updateGlassPreview(index));
      progressBar.style.width = '0%';
    }

    function prepareFillCycle() {
      fills.forEach(fill => {
        fill.style.transition = 'height .35s ease, background .2s ease, opacity .25s ease';
        fill.style.opacity = '.88';
        fill.style.height = '0%';
      });
      progressBar.style.width = '0%';
    }

    async function fadeResetFill() {
      fills.forEach(fill => {
        fill.style.transition = 'height 1.45s ease, background .2s ease, opacity 1.45s ease';
        fill.style.opacity = '0';
        fill.style.height = '0%';
      });
      await sleep(1500);
      fills.forEach(fill => {
        fill.style.transition = 'height .35s ease, background .2s ease, opacity .25s ease';
        fill.style.opacity = '.88';
      });
      miniGlasses.forEach(g => g.classList.remove('done'));
      state.forEach((_, index) => updateGlassPreview(index));
      progressBar.style.width = '0%';
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function moveHeadToGlass(index) {
      const targetGlass = miniGlasses[index].querySelector('.cup');
      const glassRect = targetGlass.getBoundingClientRect();
      const areaRect = axisArea.getBoundingClientRect();
      const headWidth = head.offsetWidth;
      const nozzleCenterOffset = headWidth / 2;
      const glassCenter = glassRect.left - areaRect.left + glassRect.width / 2;
      const left = Math.max(0, Math.min(areaRect.width - headWidth, glassCenter - nozzleCenterOffset));
      head.style.left = `${Math.round(left)}px`;
    }

    async function fillOne(index) {
      const item = state[index];
      const drink = item.drink;

      if (!item.enabled) {
        logText.textContent = '';
        progressBar.style.width = `${Math.round(((index + 1) / state.length) * 100)}%`;
        await sleep(260);
        return;
      }

      document.documentElement.style.setProperty('--active-color', drink.color);
      miniGlasses.forEach(g => g.classList.remove('selected'));
      miniGlasses[index].classList.add('selected');
      head.classList.add('moving');
      moveHeadToGlass(index);
      logText.textContent = '';
      await sleep(520);
      head.classList.remove('moving');

      head.classList.add('pouring');
      logText.textContent = drink.name;
      await sleep(170);

      fills[index].style.height = '78%';
      miniGlasses[index].classList.add('done');
      await sleep(520);

      head.classList.remove('pouring');
      progressBar.style.width = `${Math.round(((index + 1) / state.length) * 100)}%`;
    }

    async function runCycle() {
      if (running) return;
      running = true;
      shootBtn.disabled = true;
      shootBtn.textContent = 'Run';
      statusText.textContent = 'Run';
      const firstEnabled = state.find(item => item.enabled);
      if (firstEnabled) document.documentElement.style.setProperty('--active-color', firstEnabled.drink.color);
      prepareFillCycle();
      await sendShotSequence();

      for (let i = 0; i < state.length; i++) {
        await fillOne(i);
      }

      logText.textContent = 'Fertig';
      statusText.textContent = 'Ready';
      selectedGlass = 0;
      miniGlasses.forEach(g => g.classList.remove('selected'));
      miniGlasses[0].classList.add('selected');
      head.classList.add('moving');
      moveHeadToGlass(0);
      await sleep(560);
      head.classList.remove('moving', 'pouring');
      await sleep(3000);
      await fadeResetFill();
      renderConfig();
      logText.textContent = '';
      shootBtn.disabled = false;
      shootBtn.textContent = 'Shoot';
      running = false;
    }

    miniGlasses.forEach((glass, index) => {
      glass.addEventListener('click', () => selectGlass(index));
    });

    state.forEach((_, index) => updateGlassPreview(index));
    renderConfig();
    requestAnimationFrame(() => moveHeadToGlass(0));
    window.addEventListener('resize', () => moveHeadToGlass(selectedGlass ?? 0));
    menuBtn.addEventListener('click', openSettings);
    closeModal.addEventListener('click', closeSettings);
    cancelSettings.addEventListener('click', closeSettings);
    saveSettings.addEventListener('click', saveDrinkSettings);
    bleConnectBtn.addEventListener('click', connectBLE);
    settingsModal.addEventListener('click', event => {
      if (event.target === settingsModal) closeSettings();
    });
    shootBtn.addEventListener('click', runCycle);
  </script>
</body>
</html>
